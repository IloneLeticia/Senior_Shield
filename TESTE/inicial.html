<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Shield</title>
    <style>
        /* CSS Básico e Limpo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a4a75;
            font-size: 28px;
            line-height: 1.4;
        }

        p {
            color: #4a5568;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-iniciar {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-iniciar:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Senior Shield</h1>
        <p>
            Você acha que pode ter caído em um golpe digital ou está prestes a ser vítima de um? 
            Infelizmente, golpes digitais contra idosos são cada vez mais comuns, mas o conhecimento é o seu melhor escudo.
        </p>
        
        <button class="btn-iniciar" onclick="alert('Bem-vindo! Vamos começar sua proteção.')">
          <a href="teste3.html">iniciar proteção</a>
        </button>
    </div>

</body>
</html>
